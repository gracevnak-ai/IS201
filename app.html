<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Lyrics Game | Grace VandenAkker</title>
    <link href="https://fonts.googleapis.com/css?family=Merriweather+Sans:400,700" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Merriweather Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #0f3460, #533483);
            min-height: 100vh;
            color: white;
        }

        .topnav {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            display: flex;
            gap: 25px;
        }

        .topnav a {
            color: #a8d8ea;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .topnav a:hover { color: #ffffff; }

        .game-container {
            max-width: 750px;
            margin: 50px auto;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .game-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .game-header p {
            color: #a8d8ea;
            font-size: 1rem;
        }

        .progress-bar-container {
            background-color: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: #a8d8ea;
            height: 100%;
            border-radius: 20px;
            transition: width 0.4s ease;
        }

        .score-display {
            text-align: center;
            font-size: 1rem;
            color: #a8d8ea;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .question-number {
            font-size: 0.85rem;
            color: #a8d8ea;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .lyrics-box {
            background-color: rgba(0, 0, 0, 0.25);
            border-left: 4px solid #a8d8ea;
            border-radius: 8px;
            padding: 20px 25px;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.8;
            font-style: italic;
            color: #f0f0f0;
        }

        .question-text {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #a8d8ea;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 0.95rem;
            font-family: 'Merriweather Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background-color: rgba(168, 216, 234, 0.2);
            border-color: #a8d8ea;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: rgba(76, 175, 80, 0.4);
            border-color: #4caf50;
            color: white;
        }

        .option-btn.wrong {
            background-color: rgba(244, 67, 54, 0.4);
            border-color: #f44336;
            color: white;
        }

        .option-btn:disabled { cursor: not-allowed; }

        .feedback {
            text-align: center;
            font-size: 1rem;
            min-height: 28px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .feedback.correct { color: #4caf50; }
        .feedback.wrong { color: #f44336; }

        .next-btn {
            display: none;
            width: 100%;
            background-color: #a8d8ea;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            font-family: 'Merriweather Sans', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 15px;
        }

        .next-btn:hover { background-color: #ffffff; }

        .results-container {
            text-align: center;
        }

        .results-container h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 4rem;
            font-weight: 700;
            color: #a8d8ea;
            margin: 20px 0;
        }

        .score-message {
            font-size: 1.1rem;
            color: #a8d8ea;
            margin-bottom: 30px;
        }

        .restart-btn {
            background-color: #a8d8ea;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            font-size: 1rem;
            font-family: 'Merriweather Sans', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .restart-btn:hover { background-color: #ffffff; }

        .start-screen { text-align: center; }

        .start-screen h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #a8d8ea;
        }

        .start-screen p {
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .start-btn {
            background-color: #a8d8ea;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            padding: 15px 50px;
            font-size: 1.1rem;
            font-family: 'Merriweather Sans', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .start-btn:hover { background-color: #ffffff; }
    </style>
</head>

<body>

    <div class="topnav">
        <a href="index.html">Home</a>
        <a href="resume.html">Résumé</a>
        <a href="scratch.html">Music</a>
        <a href="app.html">Lyrics Game</a>
    </div>

    <div class="game-container">

        <div class="game-header">
            <h1>🎵 Guess That Song</h1>
            <p>Can you name the song from just a few lyrics?</p>
        </div>

        <!-- Start Screen -->
        <div class="card" id="start-screen">
            <div class="start-screen">
                <h2>Welcome to Guess That Song!</h2>
                <p>You'll be shown a snippet of lyrics from a popular 2010s-2020s pop hit.<br>
                Choose the correct song title from 4 options.<br>
                10 rounds — how many can you get right?</p>
                <button class="start-btn" onclick="startGame()">Let's Play!</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" style="display:none;">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
<script>
function startGame() {
    // Hide start screen
    document.getElementById("start-screen").style.display = "none";

    // Show game screen
    document.getElementById("game-screen").style.display = "block";

    console.log("Game started!"); // just to confirm it's working
}
</script>
